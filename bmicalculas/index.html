<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="title">
            <h2>BMI Calculator</h2>
        </div>

        <div class="height">
            <label>Height:</label>
            <input type="text" placeholder="Enter Height">
        </div>

        <br>

        <div class="weight">
            <label>Weight:</label>
            <input type="text" placeholder="Enter Weight">
        </div>

        <br>

        <div class="gender">
            <label>Gender:</label>
            <select>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <br>

        <div class="button">
            <button>Calculate BMI</button>
        </div>

    </div>

</body>
</html>
