<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main">
        <h2>Drum Kit</h2>

        <div class="container">

            <div class="key" data-key="74">
                <kbd>J</kbd>
                <span>Kick</span>
            </div>

            <div class="key" data-key="72">
                <kbd>H</kbd>
                <span>Snare</span>
            </div>

            <div class="key" data-key="83">
                <kbd>S</kbd>
                <span>Clap</span>
            </div>

            <div class="key" data-key="75">
                <kbd>K</kbd>
                <span>Tom</span>
            </div>

            <div class="key" data-key="82">
                <kbd>R</kbd>
                <span>Ride</span>
            </div>

            <div class="key" data-key="77">
                <kbd>M</kbd>
                <span>Crash</span>
            </div>

            <div class="key" data-key="67">
                <kbd>C</kbd>
                <span>Cowbell</span>
            </div>

        </div>
    </div>
    <audio id="j" src="music/audio.mp3"></audio>
    <audio id="h" src="music/audio2.mp3"></audio>
    <audio id="s" src="music/audio3.mp3"></audio>
    <audio id="k" src="music/audio4.mp3"></audio>
    <audio id="r" src="music/audio5.mp3"></audio>
    <audio id="m" src="music/audio6.mp3"></audio>
    <audio id="c" src="music/audio7.mp3"></audio>

    <script src="drum.js"></script>

</body>
</html>
