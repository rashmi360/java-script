<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <form class="form">

        <h2>User Information</h2>
        <p>Fill the details and save your data.</p>

        <label class="label-form">Name</label>
        <input type="text" id="name" class="input-t" placeholder="Enter your name">

        <label class="label-form">Email</label>
        <input type="email" id="email" class="input-t" placeholder="Enter your email">

        <label class="label-form">Address</label>
        <input type="text" id="address" class="input-t" placeholder="Enter your address">

        <label class="label-form">Mobile Number</label>
        <input type="text" id="Mobile-Number" class="input-t" placeholder="Enter mobile number">

        <button id="submitBtn">
            Save Data
        </button>

    </form>

    <div class="right-side"></div>

</div>

<script src="form.js"></script>

</body>
</html>
