<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body style="display:flex; justify-content:center;
 align-items:center; height:100vh;
 background-color:#f4cde4;">

    <div style="background:#544e4e; padding:20px;
     border-radius:10px; text-align:center;">

        <h2 style="color:white;">Calculator</h2>

        <input type="text" id="display" placeholder="0"
            style="width:220px; height:40px; margin-bottom:10px;
             font-size:20px; text-align:right;">

        <br>

        <button style="width:50px; height:50px;" onclick="addValue('7')">7</button>
        <button style="width:50px; height:50px;" onclick="addValue('8')">8</button>
        <button style="width:50px; height:50px;" onclick="addValue('9')">9</button>
        <button style="width:50px; height:50px;" onclick="addValue('/')">/</button>

        <br><br>

        <button style="width:50px; height:50px;" onclick="addValue('4')">4</button>
        <button style="width:50px; height:50px;" onclick="addValue('5')">5</button>
        <button style="width:50px; height:50px;" onclick="addValue('6')">6</button>
        <button style="width:50px; height:50px;" onclick="addValue('*')">*</button>

        <br><br>

        <button style="width:50px; height:50px;" onclick="addValue('1')">1</button>
        <button style="width:50px; height:50px;" onclick="addValue('2')">2</button>
        <button style="width:50px; height:50px;" onclick="addValue('3')">3</button>
        <button style="width:50px; height:50px;" onclick="addValue('-')">-</button>

        <br><br>

        <button style="width:50px; height:50px;" onclick="addValue('0')">0</button>
        <button style="width:50px; height:50px;" onclick="addValue('.')">.</button>
        <button style="width:50px; height:50px;" onclick="calculate()">=</button>
        <button style="width:50px; height:50px;" onclick="addValue('+')">+</button>

        <br><br>

        <button style="width:220px; height:50px; background:rgb(221, 153, 153); color:white;"
        onclick="clearDisplay()">
            C
        </button>

    </div>

    <script src="calculs.js"></script>

</body>
</html>
