<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body style="display:flex; justify-content:center;
 align-items:center; height:100vh;
  background-color:#f4cde4;">

    <div style="background:#544e4e; padding:20px;
     border-radius:10px; text-align:center;">
        
        <h2 style="color:white;">Calculator</h2>

        <input type="text" placeholder="0"
            style="width:220px; height:40px; margin-bottom:10px;
             font-size:20px; text-align:right;">

        <br>

        <button style="width:50px; height:50px;"onclick="Number(7)">7</button>
        <button style="width:50px; height:50px;"onclick="Number(8)">8</button>
        <button style="width:50px; height:50px;"onclick="Number(9)">9</button>
        <button style="width:50px; height:50px;"onclick="Number(/)">/</button>

        <br><br>

        <button style="width:50px; height:50px;"onclick="Number(4)">4</button>
        <button style="width:50px; height:50px;"onclick="Number(5)">5</button>
        <button style="width:50px; height:50px;"onclick="Number(6)">6</button>
        <button style="width:50px; height:50px;"onclick="Number(*)">*</button>

        <br><br>

        <button style="width:50px; height:50px;"onclick="Number(1)">1</button>
        <button style="width:50px; height:50px;"onclick="Number(2)">2</button>
        <button style="width:50px; height:50px;"onclick="Number(3)">3</button>
        <button style="width:50px; height:50px;"onclick="Number(-)">-</button>

        <br><br>

        <button style="width:50px; height:50px;"onclick="Number(0)">0</button>
        <button style="width:50px; height:50px;"onclick="Number(.)">.</button>
        <button style="width:50px; height:50px;"onclick="Number(=)">=</button>
        <button style="width:50px; height:50px;"onclick="Number(+)">+</button>

        <br><br>

        <button style="width:220px; height:50px; background:rgb(221, 153, 153); color:white;">
            C
        </button>

    </div>

</body>
</html>
