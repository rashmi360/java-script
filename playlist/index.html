<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - Modern Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <main class="player-card">
            <header class="player-header">
                <span class="now-playing-label">NOW PLAYING</span>
            </header>

            <div class="album-art-container">
                <img id="cover" src="images/cover1.svg" alt="Album Cover" class="album-cover">
            </div>

            <div class="song-details">
                <h1 id="title" class="song-title">Loading Song...</h1>
                <p id="artist" class="song-artist">Artist Name</p>
            </div>

            <div class="progress-section">
                <input type="range" id="progress" class="progress-slider" min="0" max="100" value="0">
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="prev" class="control-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
                    </svg>
                </button>
                <button id="play" class="control-btn play-btn">
                    <svg id="play-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pause-icon" class="hidden" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <button id="next" class="control-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/>
                    </svg>
                </button>
            </div>

            <div class="volume-section">
                <button id="volume-btn" class="volume-btn">
                    <svg id="volume-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
            </div>

            <audio id="audio"></audio>
        </main>

        <section class="playlist-card">
            <h2 class="playlist-title">Your Playlist</h2>
            <ul id="playlist-list" class="playlist-list"></ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
